<!DOCTYPE html>
<html>
<head>
<title>Student Feedback Form</title>
<link rel="stylesheet" href="FeedBack.css">
</head>

<body>

<div class="container">

<h2>Student Feedback Form</h2>

<form action="FeedBack.jsp" method="post">

<label>Student Name</label><br>
<input type="text" name="name" required>
<br><br>

<label>Roll Number</label><br>
<input type="text" name="roll" required>
<br><br>

<label>Department</label><br>
<select name="department">
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
</select>
<br><br>

<label>Gender</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<label>Teaching Quality</label><br>
<input type="radio" name="teaching" value="Excellent"> Excellent
<input type="radio" name="teaching" value="Good"> Good
<input type="radio" name="teaching" value="Average"> Average
<input type="radio" name="teaching" value="Poor"> Poor
<br><br>

<label>Comments</label><br>
<textarea name="comments" rows="4"></textarea>
<br><br>

<input type="submit" value="Submit Feedback">
<input type="reset" value="Clear">

</form>

</div>

</body>
</html>
